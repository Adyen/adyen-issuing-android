<?xml version="1.0" encoding="UTF-8"?>
<!--
    DocC-style hero banner, light variant.

    Mirrors the `.docc-hero` treatment defined in `docs/stylesheets/extra.css`:
    diagonal blue-grey gradient sampled from Apple's developer-docs reference,
    decorative overlapping-rhombus pattern fading to the right, dark navy
    title + muted tagline left-aligned.

    Sized 2048x512 (4:1 banner) to match the previous PNG header so the README
    layout footprint is preserved. Paired with the `-dark.svg` variant via the
    `<picture>` element in the repo root README, switched on
    `prefers-color-scheme`.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 512" width="2048" height="512" role="img" aria-labelledby="docc-hero-title docc-hero-desc">
    <title id="docc-hero-title">Adyen Issuing Android SDKs</title>
    <desc id="docc-hero-desc">A suite of Android SDKs for the Adyen Issuing platform.</desc>
    <defs>
        <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="2048" y2="512">
            <stop offset="0%" stop-color="#d5e3f2"/>
            <stop offset="100%" stop-color="#f0f6fc"/>
        </linearGradient>
    </defs>
    <rect width="2048" height="512" fill="url(#bg)"/>
    <g fill="#000000">
        <rect x="1290" y="116" width="280" height="280" transform="rotate(45 1430 256)" fill-opacity="0.06"/>
        <rect x="1500" y="116" width="280" height="280" transform="rotate(45 1640 256)" fill-opacity="0.045"/>
        <rect x="1710" y="116" width="280" height="280" transform="rotate(45 1850 256)" fill-opacity="0.03"/>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
        <text x="96" y="252" fill="#1d1d1f" font-size="80" font-weight="700" letter-spacing="-1.76">Adyen Issuing Android SDKs</text>
        <text x="96" y="320" fill="#1d1d1f" fill-opacity="0.78" font-size="32" font-weight="400">A suite of Android SDKs for the Adyen Issuing platform.</text>
    </g>
</svg>
